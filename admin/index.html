<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>内容管理后台｜二里半智能制造有限公司</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f3f6f9;
        color: #263445;
      }
      main {
        width: min(900px, 100%);
        margin: 0 auto;
        padding: 56px 18px;
      }
      .panel {
        background: #fff;
        border: 1px solid #cfd8e3;
        border-left: 6px solid #f28c28;
        padding: 28px;
        box-shadow: 0 10px 24px rgba(14, 30, 48, 0.08);
      }
      h1 {
        color: #061a31;
        margin-top: 0;
      }
      code {
        background: #eef2f6;
        padding: 2px 6px;
      }
      a {
        color: #145da0;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>内容管理后台预留入口</h1>
        <p>
          当前仓库已按 Git-based CMS / Decap CMS
          思路准备内容模型，后台配置文件位于 <code>admin/config.yml</code>。
        </p>
        <p>
          为了保持 GitHub Pages
          纯静态和相对路径，本页面暂不内置外部脚本。后续启用 Decap CMS
          时，可按托管方式接入身份认证与 CMS 脚本。
        </p>
        <p><a href="../index.html">返回网站首页</a></p>
      </section>
    </main>
  </body>
</html>
