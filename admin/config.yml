backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "assets/images"
public_folder: "assets/images"

site_url: "../"
display_url: "../"

collections:
  - name: "site_content"
    label: "网站内容"
    files:
      - label: "首页管理"
        name: "home"
        file: "content/home.json"
        format: "json"
        fields:
          - label: "Banner"
            name: "banner"
            widget: "object"
            fields:
              - {
                  label: "Banner 图片",
                  name: "image",
                  widget: "image",
                  required: false,
                }
              - { label: "Banner 标题", name: "title", widget: "string" }
              - { label: "Banner 副标题", name: "subtitle", widget: "text" }
              - label: "主按钮"
                name: "primaryButton"
                widget: "object"
                fields:
                  - { label: "按钮文字", name: "text", widget: "string" }
                  - { label: "按钮链接", name: "link", widget: "string" }
              - label: "副按钮"
                name: "secondaryButton"
                widget: "object"
                fields:
                  - { label: "按钮文字", name: "text", widget: "string" }
                  - { label: "按钮链接", name: "link", widget: "string" }
              - {
                  label: "核心标签",
                  name: "tags",
                  widget: "list",
                  field: { label: "标签", name: "tag", widget: "string" },
                }
          - {
              label: "首页业务 ID",
              name: "homeServiceIds",
              widget: "list",
              field: { label: "业务 ID", name: "id", widget: "string" },
            }
          - {
              label: "首页案例 ID",
              name: "homeCaseIds",
              widget: "list",
              field: { label: "案例 ID", name: "id", widget: "string" },
            }
          - label: "公司优势 / 交付内容"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "说明", name: "description", widget: "text" }
              - {
                  label: "排序",
                  name: "order",
                  widget: "number",
                  value_type: "int",
                }
              - {
                  label: "是否显示",
                  name: "visible",
                  widget: "boolean",
                  default: true,
                }
      - label: "关于我们管理"
        name: "about"
        file: "content/about.json"
        format: "json"
        fields:
          - { label: "公司简介", name: "companyIntro", widget: "text" }
          - { label: "服务对象", name: "serviceTargets", widget: "text" }
          - {
              label: "公司优势",
              name: "advantages",
              widget: "list",
              field: { label: "优势", name: "advantage", widget: "string" },
            }
          - { label: "保密协作说明", name: "confidentiality", widget: "text" }
      - label: "联系方式管理"
        name: "contact"
        file: "content/contact.json"
        format: "json"
        fields:
          - { label: "电话", name: "phone", widget: "string" }
          - { label: "微信", name: "wechat", widget: "string" }
          - { label: "邮箱", name: "email", widget: "string" }
          - { label: "地址", name: "address", widget: "string" }
          - { label: "备案号", name: "recordNumber", widget: "string" }
          - label: "悬浮联系按钮"
            name: "floatingButtons"
            widget: "list"
            fields:
              - { label: "按钮文字", name: "text", widget: "string" }
              - { label: "按钮链接", name: "link", widget: "string" }
  - name: "services"
    label: "业务范围"
    files:
      - label: "业务列表"
        name: "services"
        file: "content/services.json"
        format: "json"
        fields:
          - label: "业务项"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "业务名称", name: "name", widget: "string" }
              - {
                  label: "业务图片",
                  name: "image",
                  widget: "image",
                  required: false,
                }
              - { label: "业务简介", name: "summary", widget: "text" }
              - {
                  label: "核心服务内容",
                  name: "items",
                  widget: "list",
                  field: { label: "内容", name: "item", widget: "string" },
                }
              - {
                  label: "排序",
                  name: "order",
                  widget: "number",
                  value_type: "int",
                }
              - {
                  label: "是否显示",
                  name: "visible",
                  widget: "boolean",
                  default: true,
                }
  - name: "cases"
    label: "项目案例"
    files:
      - label: "案例列表"
        name: "cases"
        file: "content/cases.json"
        format: "json"
        fields:
          - label: "案例项"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "案例名称", name: "name", widget: "string" }
              - {
                  label: "案例图片",
                  name: "image",
                  widget: "image",
                  required: false,
                }
              - { label: "项目类型", name: "type", widget: "string" }
              - { label: "项目说明", name: "description", widget: "text" }
              - { label: "核心设计内容", name: "coreDesign", widget: "text" }
              - { label: "交付成果", name: "deliverables", widget: "text" }
              - { label: "适用客户", name: "customers", widget: "text" }
              - {
                  label: "是否在首页展示",
                  name: "featured",
                  widget: "boolean",
                  default: true,
                }
              - {
                  label: "排序",
                  name: "order",
                  widget: "number",
                  value_type: "int",
                }
              - {
                  label: "是否显示",
                  name: "visible",
                  widget: "boolean",
                  default: true,
                }
